kind = "web"
previewPath = "/"
title = "TEDxTheHague"
version = "1.0.0"
id = "artifacts/tedx-thehague"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21190

[services.development]
run = "pnpm --filter @workspace/tedx-thehague run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tedx-thehague", "run", "build" ]
publicDir = "artifacts/tedx-thehague/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21190"
BASE_PATH = "/"
